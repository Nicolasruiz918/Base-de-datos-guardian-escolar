services:
  postgres:
    image: postgres:15
    container_name: gps_guardian_escolar_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gps_guardian_escolar}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  liquibase:
    image: liquibase/liquibase:latest
    container_name: gps_guardian_escolar_liquibase
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/liquibase/changelog
      - ./drivers:/liquibase/lib
    command:
      - --defaults-file=/liquibase/changelog/liquibase.properties
      - update

volumes:
  postgres_data:
    name: gps_guardian_escolar_postgres_data